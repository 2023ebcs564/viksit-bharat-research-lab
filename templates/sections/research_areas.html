<section class="py-5 bg-light">

    <div class="container">

        <div class="text-center mb-5">

            <h2 class="fw-bold">

                Research Areas

            </h2>

            <p class="text-muted">

                Our multidisciplinary research focuses on solving real-world challenges through innovation and technology.

            </p>

        </div>

        <div class="row g-4">

            {% for area in research_areas %}

            <div class="col-lg-4 col-md-6">

                <div class="card h-100 border-0 shadow-sm text-center p-4">

                    <div class="mb-4">

                        <i class="{{ area.icon }} display-3 text-primary"></i>

                    </div>

                    <h4>

                        {{ area.title }}

                    </h4>

                    <p class="text-muted">

                        {{ area.short_description }}

                    </p>

                    <div class="mt-auto">

                        <a href="{% url 'research_detail' area.slug %}"
                           class="btn btn-primary">

                            Learn More

                        </a>

                    </div>

                </div>

            </div>

            {% empty %}

            <div class="col-12">

                <div class="alert alert-warning text-center">

                    No Research Areas Available.

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</section>
