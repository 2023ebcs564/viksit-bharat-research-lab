<section class="py-5">

    <div class="container">

        <div class="text-center mb-5">

            <h2 class="display-5 fw-bold">

                Achievements

            </h2>

            <p class="text-muted">

                Celebrating milestones, awards, recognitions and research excellence.

            </p>

        </div>

        <div class="row g-4">

            {% for achievement in achievements %}

            <div class="col-lg-4 col-md-6">

                <div class="card achievement-card border-0 shadow-sm h-100">

                    <div class="card-body text-center">

                        <div class="achievement-icon mb-4">

                            <i class="bi bi-trophy-fill"></i>

                        </div>

                        <span class="badge bg-warning text-dark mb-3">

                            {{ achievement.year }}

                        </span>

                        <h4 class="fw-bold">

                            {{ achievement.title }}

                        </h4>

                        <p class="text-muted">

                            {{ achievement.description|truncatewords:25 }}

                        </p>

                    </div>

                </div>

            </div>

            {% empty %}

            <div class="col-12">

                <div class="alert alert-warning text-center">

                    No Achievements Available.

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

</section>
