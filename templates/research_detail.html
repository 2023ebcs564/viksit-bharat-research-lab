{% extends "base.html" %}

{% block title %}
{{ research.title }}
{% endblock %}

{% block content %}

<section class="py-5 bg-light">

    <div class="container">

        <div class="row align-items-center">

            <div class="col-lg-6">

                {% if research.image %}

                <img
                    src="{{ research.image.url }}"
                    class="img-fluid rounded shadow"
                    alt="{{ research.title }}">

                {% else %}

                <img
                    src="https://placehold.co/800x500?text=Research"
                    class="img-fluid rounded shadow"
                    alt="Research">

                {% endif %}

            </div>

            <div class="col-lg-6">

                <span class="badge bg-primary mb-3">

                    Research Area

                </span>

                <h1 class="fw-bold mb-4">

                    {{ research.title }}

                </h1>

                <p class="lead text-muted">

                    {{ research.short_description }}

                </p>

                <hr>

                <div class="research-content">

                    {{ research.description|safe }}

                </div>

                <a
                    href="{% url 'research' %}"
                    class="btn btn-primary mt-4">

                    ← Back to Research Areas

                </a>

            </div>

        </div>

    </div>

</section>

{% endblock %}
