{% extends "base.html" %}

{% block title %}
404 - Page Not Found
{% endblock %}

{% block content %}

<section class="py-5">

    <div class="container">

        <div class="row justify-content-center align-items-center">

            <div class="col-lg-8 text-center">

                <h1
                    class="display-1 fw-bold text-primary">

                    404

                </h1>

                <h2
                    class="fw-bold mb-4">

                    Oops! Page Not Found

                </h2>

                <p
                    class="lead text-muted mb-5">

                    The page you are looking for does not exist,
                    may have been moved, or the URL is incorrect.

                </p>

                <a
                    href="{% url 'home' %}"
                    class="btn btn-primary btn-lg">

                    <i class="bi bi-house-fill me-2"></i>

                    Back to Home

                </a>

            </div>

        </div>

    </div>

</section>

{% endblock %}
